<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downscrafters - Panel MC</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1>Downscrafters <span class="badge">Forge</span></h1>
            <p>Control Remoto de Servidor Minecraft</p>
        </header>

        <!-- Sección de Login -->
        <section id="login-section" class="card active">
            <h2>Autenticación</h2>
            <div class="input-group">
                <input type="password" id="api-key" placeholder="Introduce la clave secreta">
            </div>
            <div class="input-group">
                <input type="text" id="tunnel-url" placeholder="URL del Servidor (ej. https://xxxx.ngrok-free.app)" value="">
                <small>Deja esto en blanco si accedes localmente (http://localhost:3001)</small>
            </div>
            <button id="btn-login" class="btn primary">Conectar</button>
            <p id="login-error" class="error-msg hidden"></p>
        </section>

        <!-- Panel de Control -->
        <section id="control-section" class="card hidden">
            <div class="status-panel">
                <h2>Estado: <span id="server-status" class="status-badge offline">Desconectado</span></h2>
            </div>
            
            <div class="actions">
                <button id="btn-start" class="btn success">Iniciar Servidor</button>
                <button id="btn-stop" class="btn danger">Detener Servidor</button>
            </div>

            <div class="files-panel">
                <h3>Archivos Raíz (Solo lectura)</h3>
                <button id="btn-refresh-files" class="btn secondary small">Refrescar</button>
                <ul id="file-list" class="file-list">
                    <li>Conéctate para ver los archivos...</li>
                </ul>
            </div>
            
            <button id="btn-logout" class="btn danger outline" style="margin-top: 20px;">Desconectar</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
